name: 03 · Build + Deploy to Bluehost

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  workflow_run:
    workflows: ["02 · AI Enrich + Country Dashboards"]
    types:
      - completed

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build React app
        env:
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_AI_PROXY_URL:                https://tekdruid.com/medilens/api/ai.php
          VITE_AI_PROXY_TOKEN:              ${{ secrets.MEDILENS_PROXY_TOKEN }}
        run: npm run build
        working-directory: frontend

      - name: Package PHP AI Proxy
        run: |
          mkdir -p frontend/dist/api
          cp bluehost-api/* frontend/dist/api/
          # Create the secrets file from GitHub Secrets
          cat <<EOF > frontend/dist/api/secrets.php
          <?php
          putenv("GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}");
          putenv("GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}");
          putenv("MEDILENS_PROXY_TOKEN=${{ secrets.MEDILENS_PROXY_TOKEN }}");
          EOF



      - name: Deploy to Bluehost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:        ${{ secrets.FTP_SERVER }}
          username:      ${{ secrets.FTP_USERNAME }}
          password:      ${{ secrets.FTP_PASSWORD }}
          local-dir:     ./frontend/dist/
          server-dir:    ./
          exclude:       |
            **/.git*
            **/.git*/**
            **/node_modules/**
