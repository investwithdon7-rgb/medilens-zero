<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080d"/>
      <stop offset="100%" style="stop-color:#0f0f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="80" y="60" width="180" height="4" rx="2" fill="url(#accent)"/>

  <!-- Logo mark -->
  <rect x="80" y="90" width="48" height="48" rx="10" fill="#2563eb"/>
  <text x="104" y="122" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">M</text>

  <!-- App name -->
  <text x="142" y="122" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="white">Medi</text>
  <text x="218" y="122" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#60a5fa">Lens</text>

  <!-- Tagline badge -->
  <rect x="80" y="165" width="290" height="28" rx="14" fill="rgba(37,99,235,0.15)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
  <text x="225" y="184" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="middle" letter-spacing="1">OPEN GLOBAL MEDICINE INTELLIGENCE</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, sans-serif" font-size="56" font-weight="800" fill="white">The Medicine Gap</text>
  <text x="80" y="345" font-family="system-ui, sans-serif" font-size="56" font-weight="800" fill="#60a5fa">is Real. Now Visible.</text>

  <!-- Description -->
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="20" fill="rgba(148,163,184,0.9)">Track drug approvals, pricing gaps, and access inequities</text>
  <text x="80" y="428" font-family="system-ui, sans-serif" font-size="20" fill="rgba(148,163,184,0.9)">across 80+ countries. Free. Forever.</text>

  <!-- Stats row -->
  <rect x="80" y="490" width="170" height="70" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="165" y="528" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">80+</text>
  <text x="165" y="550" font-family="system-ui, sans-serif" font-size="13" fill="rgba(148,163,184,0.8)" text-anchor="middle">Countries tracked</text>

  <rect x="268" y="490" width="170" height="70" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="353" y="528" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#fbbf24" text-anchor="middle">2B+</text>
  <text x="353" y="550" font-family="system-ui, sans-serif" font-size="13" fill="rgba(148,163,184,0.8)" text-anchor="middle">Without access</text>

  <rect x="456" y="490" width="170" height="70" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="541" y="528" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#fb7185" text-anchor="middle">278×</text>
  <text x="541" y="550" font-family="system-ui, sans-serif" font-size="13" fill="rgba(148,163,184,0.8)" text-anchor="middle">Max price gap</text>

  <!-- Right visual: bar chart decoration -->
  <g opacity="0.6">
    <rect x="820" y="200" width="40" height="300" rx="6" fill="rgba(37,99,235,0.25)"/>
    <rect x="880" y="280" width="40" height="220" rx="6" fill="rgba(99,102,241,0.25)"/>
    <rect x="940" y="150" width="40" height="350" rx="6" fill="rgba(37,99,235,0.35)"/>
    <rect x="1000" y="230" width="40" height="270" rx="6" fill="rgba(99,102,241,0.20)"/>
    <rect x="1060" y="310" width="40" height="190" rx="6" fill="rgba(37,99,235,0.20)"/>
    <rect x="1120" y="180" width="40" height="320" rx="6" fill="rgba(99,102,241,0.30)"/>
  </g>

  <!-- URL -->
  <text x="1120" y="590" font-family="system-ui, monospace" font-size="14" fill="rgba(148,163,184,0.5)" text-anchor="end">tekdruid.com/medilens</text>
</svg>
