name: 02 · AI Enrich + Country Dashboards

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI drug summaries (Gemini)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
        run: python -m medilens.compute.ai_enricher

      - name: Compute approval lag
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.compute.lag_calculator

      - name: Generate country dashboards
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
        run: python -m medilens.compute.country_dashboards

      - name: Trigger build & deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner:   context.repo.owner,
              repo:    context.repo.repo,
              workflow_id: '03-build-and-deploy.yml',
              ref:     'master',
            });
