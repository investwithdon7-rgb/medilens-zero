name: 05 · Deploy Firestore Rules

# WHY THIS EXISTS
# The app is hosted on Bluehost (workflow 03 FTPs the built frontend); Firestore
# is used only as a database. Nothing else in CI deploys firestore.rules, so rule
# changes in the repo never reached the live project — which is why crowdsourced
# "Request Drug Tracking" writes failed with "Missing or insufficient permissions"
# (the drug_requests create rule existed in the repo but not in production).
#
# We deploy via the Firebase Rules REST API (medilens/deploy_firestore_rules.py)
# rather than `firebase deploy`, because the CLI performs a Service Usage API
# check that the pipeline service account is not permitted to make (403). The
# REST API needs only firebaserules permissions, which the SA already has.

on:
  push:
    branches: [ master ]
    paths:
      - 'firestore.rules'
      - 'medilens/deploy_firestore_rules.py'
      - '.github/workflows/05-deploy-firestore-rules.yml'
  workflow_dispatch:

concurrency:
  group: deploy-firestore-rules
  cancel-in-progress: false

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy Firestore rules
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.deploy_firestore_rules
