name: 03 · Build + Deploy to Bluehost

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["02 · AI Enrich + Country Dashboards"]
    types:
      - completed
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build Orama search index
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Export drug list for search index
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          pip install -r requirements.txt
          python -m medilens.compute.build_search_index

      - name: Compile Orama binary search index
        run: |
          cd frontend
          node scripts/build_orama.js
          cp ../data/search-index.orama.bin public/ 2>/dev/null || echo "No index compiled"

      - name: Build React app
        env:
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_AI_PROXY_URL:                https://tekdruid.com/medilens/api/ai.php
        run: npm run build
        working-directory: frontend

      - name: Deploy to Bluehost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:        ${{ secrets.FTP_SERVER }}
          username:      ${{ secrets.FTP_USERNAME }}
          password:      ${{ secrets.FTP_PASSWORD }}
          local-dir:     ./frontend/dist/
          server-dir:    /public_html/medilens/
          exclude:       |
            **/.git*
            **/.git*/**
            **/node_modules/**
