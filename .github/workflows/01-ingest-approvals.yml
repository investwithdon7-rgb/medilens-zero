name: 01 · Ingest Approvals (FDA + EMA + PMDA + CDSCO + WHO PQ)

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 1 * * *'   # Daily 01:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  # ── Job 1: Fast curated seeds (no web scraping) ───────────────────────────
  # Runs in ~10 min. Seeds approval records, pricing, drug details.
  ingest-seeds:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed Major Disease Portfolio
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.ingest.major_diseases

      - name: Seed Drug Details (Originator, Indication, Formulations)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.ingest.drug_details

      - name: Seed Curated Approval Records
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.ingest.approval_seeds

      - name: Ingest PMDA Japan Approvals
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.ingest.pmda

      - name: Ingest CDSCO India Approvals
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.ingest.cdsco

      - name: Run Global Reference Pricing ingestor
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.ingest.pricing

  # ── Job 2: Web scrapers (FDA API + EMA EPAR + WHO PQ + WHO EML) ───────────
  # Runs in ~40 min. Network-heavy; isolated so a slow scraper doesn't block seeds.
  ingest-scrapers:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FDA ingestor
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.ingest.fda

      - name: Ingest Drugs (EMA + EU/UK Focus)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python -m medilens.ingest.ema
          python -m medilens.ingest.euro_focus

      - name: Run WHO Prequalification ingestor
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.ingest.who_preq

      - name: Enrich with WHO Essential Medicines List
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.ingest.who_eml

  # ── Job 3: Compute (runs after both ingest jobs finish) ───────────────────
  # Reads all approval data and builds derived collections.
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [ingest-seeds, ingest-scrapers]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute Approval Lags
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.compute.lag_calculator

      - name: Build Country Dashboards
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python -m medilens.compute.country_dashboards

